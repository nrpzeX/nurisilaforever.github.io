<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aşk Hikayemiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <audio id="background-audio" loop preload="auto" autoplay>
        <source src="song/song.mp3" type="audio/mpeg">
        <!-- Müzik dosyasını audio/muzik.mp3 olarak ekleyin -->
    </audio>

    <header>
        <h1>💕 Sıla & Nuri 💕</h1>
    </header>

    <div class="container">
        <section class="gallery">
            <div class="photo-card">
                <img src="img/date.jpg" alt="İlk Date">
                <div class="photo-caption">İlk Date'imiz</div>
            </div>
            <div class="photo-card">
                <img src="img/cinema.jpg" alt="İlk Sinema">
                <div class="photo-caption">İlk Sinemamız</div>
            </div>
            <div class="photo-card">
                <img src="img/tour.jpg" alt="İlk Gezi">
                <div class="photo-caption">İlk Gezimiz / Turumuz</div>
            </div>
            <div class="photo-card">
                <img src="img/lock.jpg" alt="Aşkımın Doğum Günü">
                <div class="photo-caption">Aşkımızın Kilidi</div>
            </div>
            <div class="photo-card">
                <img src="img/birth.jpg" alt="Photo 3">
                <div class="photo-caption">Hayatımın Doğum Günüüü 03.01.06</div>
            </div>
        </section>

    </div>

    <!-- Javascript -->
    <script src="script.js"></script>
</body>

</html>
