<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aşk Hikayemiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button id="audio-toggle" aria-label="Müziği aç/kapat">🔊</button>
    <audio id="background-audio" loop preload="auto" autoplay>
        <source src="song/song.mp3" type="audio/mpeg">
        <!-- Müzik dosyasını audio/muzik.mp3 olarak ekleyin -->
    </audio>

    <header>
        <h1>💕 Sıla & Nuri 💕</h1>
    </header>

    <div class="container">
        <section class="gallery">
            <div class="photo-card">
                <img src="img/date.JPEG" alt="Our first date">
                <div class="photo-caption">İlk Date'imiz</div>
            </div>
            <div class="photo-card">
                <img src="img/cinema.jpg" alt="Photo 2">
                <div class="photo-caption">İlk Sinemamız</div>
            </div>
            <div class="photo-card">
                <img src="img/tour.JPEG" alt="Photo 3">
                <div class="photo-caption">İlk Gezimiz / Turumuz</div>
            </div>
        </section>

    </div>

    <!-- Javascript -->
    <script src="script.js"></script>
</body>

</html>
